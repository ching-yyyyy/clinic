<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>иЁәжүҖз—…жӮЈиҝҪи№Өзі»зөұ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
--border:#2e3250;--text:#e8eaf6;--text2:#8b90b0;
--blue:#4f8ef7;--blue-dim:#1e3a6e;
--green:#4caf7d;--green-dim:#1a3d2b;
--amber:#f0a03a;--amber-dim:#3d2a0a;
--red:#e05555;--red-dim:#3d1515;
--chat-w:280px;--radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* в”Җв”Җ LOGIN PAGE в”Җв”Җ */
.login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:360px;max-width:95vw}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.login-logo i{color:var(--blue);font-size:28px}
.login-logo span{font-size:20px;font-weight:600}
.login-title{font-size:15px;font-weight:500;margin-bottom:20px;text-align:center;color:var(--text2)}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.field input{width:100%;font-size:14px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.field input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;margin-top:6px}
.login-btn:hover{background:#3a7ae8}
.login-err{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
.pw-rules{font-size:11px;color:var(--text2);margin-top:8px;line-height:1.8}
.pw-rule{display:flex;align-items:center;gap:6px}
.pw-rule.ok{color:var(--green)}
.pw-rule.fail{color:var(--text2)}
/* в”Җв”Җ TOPBAR в”Җв”Җ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.logo i{color:var(--blue)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .3s}
.sync-dot.on{background:var(--green)}
.topbar-right{display:flex;gap:8px;align-items:center}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px}
.user-chip .role-tag{font-size:10px;background:var(--blue-dim);color:var(--blue);padding:1px 7px;border-radius:20px}
.user-chip .role-tag.admin{background:var(--amber-dim);color:var(--amber)}
.btn{padding:6px 13px;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#3a7ae8;color:#fff}
.btn-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.btn-red:hover{background:var(--red);color:#fff}
/* в”Җв”Җ MAIN в”Җв”Җ */
.main{display:flex;flex:1;overflow:hidden;position:relative}
.board{display:flex;gap:10px;padding:12px;overflow-x:auto;flex:1;align-items:flex-start}
.col{min-width:200px;max-width:215px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;max-height:calc(100vh - 115px)}
.col-header{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.col-name{font-size:13px;font-weight:500}
.col-meta{display:flex;align-items:center;gap:4px}
.count{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--text2)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:3px;border-radius:4px;font-size:15px;display:flex;align-items:center;line-height:1}
.icon-btn:hover{color:var(--text);background:var(--bg3)}
.icon-btn:disabled{opacity:.2;cursor:default}
.cards{padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.empty-zone{min-height:50px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2)}
.drop-highlight{border-color:var(--blue)!important;background:rgba(79,142,247,.07)}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:grab;transition:border-color .15s}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:6px}
.card-left{display:flex;align-items:center;gap:6px}
.order-btns{display:flex;flex-direction:column;gap:1px}
.order-btn{background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--text2);padding:0 3px;font-size:11px;line-height:1.5;display:flex;align-items:center}
.order-btn:hover:not(:disabled){background:var(--bg2);color:var(--text)}
.order-btn:disabled{opacity:.2;cursor:default}
.card-name{font-size:13px;font-weight:500}
.card-pos{font-size:10px;color:var(--text2);margin-top:1px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-green{background:var(--green-dim);color:var(--green)}
.card-times{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;flex-direction:column;gap:2px}
.card-notes{margin-bottom:6px}
.note-item{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px}
.note-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--blue)}
.note-text{font-size:12px;color:var(--text2)}
.note-text.done{text-decoration:line-through;opacity:.5}
.card-footer{display:flex;align-items:center;justify-content:flex-end}
.card-btns{display:flex;gap:2px}
.add-col-btn{min-width:140px;height:50px;border:1.5px dashed var(--border);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0}
.add-col-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--blue)}
/* в”Җв”Җ CHAT PANEL в”Җв”Җ */
.chat-panel{width:var(--chat-w);min-width:var(--chat-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s,min-width .25s;overflow:hidden}
.chat-panel.collapsed{width:48px;min-width:48px}
.chat-tab{display:none;flex-direction:column;align-items:center;padding:14px 0;gap:10px;cursor:pointer;height:100%}
.chat-panel.collapsed .chat-tab{display:flex}
.chat-panel.collapsed .chat-body{display:none}
.chat-tab-icon{width:32px;height:32px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:16px;position:relative}
.mention-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 5px;min-width:16px;text-align:center;display:none}
.mention-badge.show{display:block}
.chat-tab-label{writing-mode:vertical-rl;font-size:11px;color:var(--text2);letter-spacing:1px}
.mentioned-banner{display:none;background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:6px 8px;border-radius:6px;text-align:center;margin:0 6px;cursor:pointer;line-height:1.4;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.mentioned-banner.show{display:block}
.chat-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-panel-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.chat-panel-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.chat-panel-title i{color:var(--blue)}
.chat-toggle-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.chat-toggle-btn:hover{color:var(--text);border-color:var(--blue)}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg-bubble{display:flex;flex-direction:column;gap:3px;max-width:100%}
.msg-bubble.me{align-items:flex-end}
.msg-meta{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:5px}
.msg-meta .author{font-weight:500;color:var(--blue)}
.msg-bubble.me .msg-meta .author{color:var(--green)}
.msg-body{background:var(--bg3);border:1px solid var(--border);border-radius:10px;border-top-left-radius:3px;padding:8px 11px;font-size:13px;line-height:1.5;word-break:break-word;max-width:220px}
.msg-bubble.me .msg-body{background:var(--blue-dim);border-color:var(--blue);border-top-left-radius:10px;border-top-right-radius:3px}
.msg-bubble.mentioned .msg-body{background:#3d1a00;border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.mentioned-tag{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-bottom:4px}
.mention{color:var(--amber);font-weight:600}
/* в”Җв”Җ TODAY'S CLIENTS PANEL (LEFT SIDEBAR) в”Җв”Җ */
.appt-panel{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;max-height:calc(100vh - 115px);transition:width .25s,min-width .25s;overflow:hidden}
.appt-panel.collapsed{width:42px;min-width:42px}
.appt-panel.collapsed .appt-body{display:none}
.appt-panel.collapsed .appt-collapsed-tab{display:flex}
.appt-collapsed-tab{display:none;flex-direction:column;align-items:center;padding:14px 0;gap:10px;cursor:pointer;height:100%}
.appt-collapsed-icon{width:32px;height:32px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber);display:flex;align-items:center;justify-content:center;color:var(--amber);font-size:16px}
.appt-collapsed-label{writing-mode:vertical-rl;font-size:11px;color:var(--text2);letter-spacing:1px}
.appt-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.appt-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.appt-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.appt-title i{color:var(--amber)}
.appt-toggle-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.appt-toggle-btn:hover{color:var(--text);border-color:var(--amber)}
.appt-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.appt-list::-webkit-scrollbar{width:4px}
.appt-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.appt-add-row{padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.appt-add-btn{width:100%;padding:7px;font-size:12px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.appt-add-btn:hover{border-color:var(--amber);color:var(--amber)}
.appt-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;cursor:grab;transition:border-color .15s}
.appt-card.dragging{opacity:.4;cursor:grabbing}
.appt-card:hover{border-color:var(--amber)}
.appt-card.arrived{border-color:var(--green);opacity:.7}
.appt-card.checked-in{border-color:var(--blue);opacity:.6}
.appt-card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.appt-card-time{font-size:11px;color:var(--amber);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.appt-items{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.appt-item-tag{font-size:10px;background:var(--amber-dim);color:var(--amber);border-radius:4px;padding:1px 6px}
.appt-status{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;display:inline-block}
.appt-status.waiting{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.appt-status.arrived{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.appt-status.checked{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue)}
/* checklist inside appt-card */
.appt-checklist{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.appt-check-item{display:flex;align-items:center;gap:5px}
.appt-check-item input[type=checkbox]{flex-shrink:0;accent-color:var(--amber);cursor:pointer}
.appt-check-item input[type=checkbox]:checked~span{text-decoration:line-through;opacity:.5}
.appt-check-label{font-size:11px;color:var(--text2);cursor:pointer}
/* item picker */
.item-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:220px;overflow-y:auto;padding:4px 0}
.item-chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;white-space:nowrap}
.item-chip:hover{border-color:var(--amber);color:var(--amber)}
.item-chip.selected{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.item-search{width:100%;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);margin-bottom:8px}
.item-search:focus{outline:none;border-color:var(--amber)}
.patient-ref{display:inline-flex;align-items:center;gap:4px;background:var(--amber-dim);border:1px solid var(--amber);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--amber);font-weight:500}
.msg-confirm{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.confirm-btn{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px}
.confirm-btn:hover{border-color:var(--green);color:var(--green)}
.confirm-tag{font-size:10px;background:var(--green-dim);color:var(--green);border:1px solid var(--green);border-radius:20px;padding:1px 8px;display:flex;align-items:center;gap:3px}
.quick-actions{padding:6px 8px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.quick-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;white-space:nowrap}
.quick-btn:hover{border-color:var(--blue);color:var(--blue)}
.chat-input-area{padding:10px;border-top:1px solid var(--border);flex-shrink:0;position:relative}
.chat-input-row{display:flex;gap:6px;align-items:flex-end}
.chat-textarea{flex:1;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);resize:none;min-height:38px;max-height:80px;font-family:inherit;line-height:1.4}
.chat-textarea:focus{outline:none;border-color:var(--blue)}
.send-btn{padding:8px 12px;background:var(--blue);border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.send-btn:hover{background:#3a7ae8}
.mention-popup{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 0;z-index:50;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,.5);bottom:100%;left:10px;right:10px;max-height:160px;overflow-y:auto}
.mention-item{padding:7px 12px;font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:7px}
.mention-item:hover{background:var(--bg3);color:var(--blue)}
.statbar{display:flex;gap:14px;padding:7px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:12px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px}
.stat b{color:var(--text)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-row input,.form-row textarea,.form-row select{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.form-row input:focus,.form-row textarea:focus{outline:none;border-color:var(--blue)}
.form-row textarea{resize:vertical;min-height:70px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--blue);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.notif.show{transform:translateX(-50%) translateY(0);opacity:1}
.day-div{display:flex;align-items:center;gap:8px;margin:4px 0}
.day-div span{font-size:11px;color:var(--text2);white-space:nowrap}
.day-div::before,.day-div::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="login-page">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-activity-heartbeat"></i><span>иЁәжүҖз—…жӮЈиҝҪи№Ө</span></div>
    <div class="login-title">и«Ӣзҷ»е…ҘжӮЁзҡ„еёіиҷҹ</div>
    <div class="field"><label>йӣ»еӯҗйғөд»¶</label><input type="email" id="login-email" placeholder="xxx@cofit.me" autocomplete="email"></div>
    <div class="field"><label>еҜҶзўј</label><input type="password" id="login-pw" placeholder="ијёе…ҘеҜҶзўј" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">зҷ»е…Ҙ</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- CHANGE PASSWORD PAGE -->
<div class="login-page" id="change-pw-page" style="display:none">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-lock"></i><span>иЁӯе®ҡж–°еҜҶзўј</span></div>
    <div class="login-title" style="color:var(--amber)">вҡ пёҸ йҰ–ж¬Ўзҷ»е…Ҙи«ӢиЁӯе®ҡж–°еҜҶзўј</div>
    <div class="field"><label>ж–°еҜҶзўј</label><input type="password" id="new-pw" placeholder="иҮіе°‘8зўјпјҢе°ҸеҜ«иӢұж–Ү+ж•ёеӯ—" oninput="checkPwRules()"></div>
    <div class="field"><label>зўәиӘҚж–°еҜҶзўј</label><input type="password" id="new-pw2" placeholder="еҶҚијёе…ҘдёҖж¬Ў"></div>

function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')}
function calcDwell(p){
  if(!p.checkin_time)return'';
  const[h,m]=p.checkin_time.split(':').map(Number);
  const end=p.discharge_time||now();
  const[eh,em]=end.split(':').map(Number);
  const diff=(eh*60+em)-(h*60+m);
  return diff>0?diff+'еҲҶйҗҳ':'';
}

  try{

}

// в”Җв”Җ DATA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadAll(){
  const[{data:cols},{data:pats},{data:msgs},{data:staffList},{data:appts}]=await Promise.all([
    db.from('columns').select('*').order('sort_order'),
    db.from('patients').select('*').order('sort_order'),
    anonDb.from('clinic_messages').select('*').order('created_at').limit(300),
    db.from('staff').select('name,email,role').order('name'),
    anonDb.from('appointments').select('*').eq('appt_date',todayStr()).order('appt_time')
  ]);
  if(cols)state.columns=cols;
  if(pats)state.patients=pats.map(p=>({...p,notes:Array.isArray(p.notes)?p.notes:[]}));
  if(msgs)state.messages=msgs.map(m=>({...m,confirmations:Array.isArray(m.confirmations)?m.confirmations:[]}));
  if(staffList)state.staffList=staffList;
  if(appts)state.appointments=appts;
  render();renderChat();renderApptList();
}
async function reloadPatients(){
  const{data}=await db.from('patients').select('*').order('sort_order');

  renderBoard();renderStats();
}

}
setInterval(async()=>{if(!currentUser)return;await db.auth.refreshSession();},600000);

function subscribeRealtime(){
  anonDb.channel('clinic-appts-'+Math.random().toString(36).slice(2))
    .on('postgres_changes',{event:'*',schema:'public',table:'appointments'},()=>loadAppointments())
    .subscribe();
  anonDb.channel('clinic-main-'+Math.random().toString(36).slice(2))
    .on('postgres_changes',{event:'*',schema:'public',table:'patients'},()=>reloadPatients())
    .on('postgres_changes',{event:'*',schema:'public',table:'columns'},()=>reloadColumns())
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'clinic_messages'},payload=>{
      const m=payload.new;
      const idx=state.messages.findIndex(x=>x.id===m.id);
      if(idx>=0)state.messages[idx]={...state.messages[idx],confirmations:Array.isArray(m.confirmations)?m.confirmations:[]};
      renderChat();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'clinic_messages'},async payload=>{
      const m=payload.new;
      if(myMsgIds.has(m.id))return;
      if(!state.messages.find(x=>x.id===m.id)){
        state.messages.push({...m,confirmations:Array.isArray(m.confirmations)?m.confirmations:[]});
      }
      renderChat();
      const me=myName();
      if(me&&m.author!==me&&m.text&&m.text.includes('@'+me)){
        if(chatCollapsed){unreadMentions++;updateMentionBadge();}
        showNotif('рҹ“ў '+m.author+' жЁҷиЁҳдәҶдҪ ');
        if(Notification.permission==='granted')new Notification('жӮЁе·Іиў«жЁҷиЁ»',{body:m.author+'пјҡ'+m.text});
      }
    })
    .subscribe(s=>{setSyncStatus(s==='SUBSCRIBED');if(s==='SUBSCRIBED')loadAll();});
  if(Notification.permission==='default')Notification.requestPermission();
}

function expandChat(){
  chatCollapsed=false;document.getElementById('chat-panel').classList.remove('collapsed');
  unreadMentions=0;updateMentionBadge();

function updateMentionBadge(){
  const b=document.getElementById('mention-badge'),bn=document.getElementById('mentioned-banner');

}

function renderBoard(){
  const board=document.getElementById('board');if(!board)return;
  board.innerHTML='';
  [...state.columns].sort((a,b)=>a.sort_order-b.sort_order).forEach(col=>{
    const pts=patientsInCol(col.id);
    const div=document.createElement('div');div.className='col';
    div.setAttribute('ondragover',"onDragOver(event,'"+col.id+"')");
    div.setAttribute('ondrop',"onDrop(event,'"+col.id+"')");
    div.setAttribute('ondragleave',"onDragLeave(event,'"+col.id+"')");
    div.innerHTML=`
      <div class="col-header">
        <span class="col-name">${col.name}</span>
        <div class="col-meta">
          <span class="count">${pts.length}</span>
          <button class="icon-btn" onclick="callCol('${col.id}')"><i class="ti ti-bell"></i></button>
          ${isAdmin()?`<button class="icon-btn" onclick="renameCol('${col.id}')"><i class="ti ti-edit"></i></button>
          <button class="icon-btn" onclick="deleteCol('${col.id}')"><i class="ti ti-trash"></i></button>`:''}

      </div>
      <div class="cards" id="cards-${col.id}"
        ondragover="onDragOver(event,'${col.id}')"
        ondrop="onDrop(event,'${col.id}')"
        ondragleave="onDragLeave(event,'${col.id}')">
        ${pts.length===0?'<div class="empty-zone">жӢ–жӣіз—…жӮЈиҮіжӯӨ</div>':''}
        ${pts.map((p,i)=>cardHTML(p,i,pts.length)).join('')}

    board.appendChild(div);
  });

    const add=document.createElement('button');
    add.className='add-col-btn';
    add.innerHTML='<i class="ti ti-plus"></i>ж–°еўһз«ҷеҲҘ';
    add.onclick=addCol;
    board.appendChild(add);
  }
}
function cardHTML(p,idx,total){
  // дҫҶиЁәзӣ®зҡ„пјҡжңүеӢҫйҒёжЎҶпјҢе®ҢжҲҗеҫҢд»ҚеҸҜеӢҫйҒё
  const notes=(p.notes||[]).map((n,i)=>`
    <div class="note-item">
      <input type="checkbox" ${n.checked?'checked':''} onchange="toggleNote('${p.id}',${i})">
      <span class="note-text ${n.checked?'done':''}">${n.text}</span>
    </div>`).join('');
  // еӮҷиЁ»пјҡзҙ”ж–Үеӯ—пјҢз„ЎеӢҫйҒё
  const remark=p.remark?`<div style="font-size:11px;color:var(--text2);background:var(--bg);border-radius:4px;padding:4px 6px;margin-bottom:5px">рҹ“қ ${p.remark}</div>`:'';
  const tagClass=p.tag==='еҲқиЁә'?'badge-amber':p.tag==='жҖҘиЁә'?'badge-blue':'badge-green';
  return`<div class="card" draggable="true" id="card-${p.id}" ondragstart="onDragStart(event,'${p.id}')" ondragend="onDragEnd()">
    <div class="card-top">
      <div class="card-left">
        <div class="order-btns">
          <button class="order-btn" onclick="moveCard('${p.id}',-1)" ${idx===0?'disabled':''}>в–І</button>
          <button class="order-btn" onclick="moveCard('${p.id}',1)" ${idx===total-1?'disabled':''}>в–ј</button>
        </div>
        <div><div class="card-name">${p.name}</div><div class="card-pos">з¬¬${idx+1}дҪҚ</div></div>
      </div>
      <span class="badge ${tagClass}">${p.tag||''}</span>
    </div>
    <div class="card-times">
      <span>рҹ•җ е ұеҲ°пјҡ${p.checkin_time||'вҖ”'}</span>
      ${p.discharge_time?`<span>рҹҡӘ йӣўйҷўпјҡ${p.discharge_time}</span>`:''}
      ${calcDwell(p)?`<span>${calcDwell(p)}</span>`:''}
    </div>
    ${notes?`<div class="card-notes">${notes}</div>`:''}
    ${remark}
    <div class="card-footer"><div class="card-btns">
      <button class="icon-btn" onclick="openEdit('${p.id}')"><i class="ti ti-edit"></i></button>
      <button class="icon-btn" onclick="dischargeP('${p.id}')"><i class="ti ti-logout"></i></button>
      ${isAdmin()?`<button class="icon-btn" onclick="deleteP('${p.id}')" style="color:var(--red)"><i class="ti ti-trash"></i></button>`:''}
    </div></div>
  </div>`;
}
function renderStats(){
  const el=document.getElementById('statbar');if(!el)return;
  const total=state.patients.length,disc=state.patients.filter(p=>p.discharge_time).length;
  const dwells=state.patients.filter(p=>p.checkin_time&&p.discharge_time).map(p=>parseInt(calcDwell(p))).filter(n=>!isNaN(n));
  const avg=dwells.length?Math.round(dwells.reduce((a,b)=>a+b,0)/dwells.length):0;
  el.innerHTML=`
    <div class="stat"><i class="ti ti-users"></i>д»Ҡж—Ҙпјҡ<b>${total}</b></div>
    <div class="stat"><i class="ti ti-clock"></i>еҖҷиЁәдёӯпјҡ<b>${total-disc}</b></div>
    <div class="stat"><i class="ti ti-check"></i>е·Ійӣўйҷўпјҡ<b>${disc}</b></div>
    ${avg?`<div class="stat"><i class="ti ti-trending-up"></i>е№іеқҮеҒңз•ҷпјҡ<b>${avg}еҲҶйҗҳ</b></div>`:''}
    <div class="stat"><i class="ti ti-calendar-event"></i>д»Ҡж—Ҙй җзҙ„пјҡ<b>${(state.appointments||[]).length}</b></div>`;
}

function renderApptList(){
  const el=document.getElementById('appt-list');if(!el)return;
  const list=state.appointments||[];
  if(!list.length){el.innerHTML='<div style="font-size:12px;color:var(--text2);text-align:center;padding:20px 0">д»Ҡж—Ҙе°ҡз„Ўй җзҙ„е®ўжҲ¶</div>';return;}
  el.innerHTML=list.map(a=>{
    const items=a.items||[];
    // Checklist for appointment items
    const checklist=items.length?`<div class="appt-checklist">${items.map((t,i)=>`
      <div class="appt-check-item">
        <input type="checkbox" id="ac-${a.id}-${i}" ${(a.checked_items||[]).includes(i)?'checked':''}
          onchange="toggleApptItem('${a.id}',${i},this)" onclick="event.stopPropagation()">
        <span class="appt-check-label" onclick="document.getElementById('ac-${a.id}-${i}').click();event.stopPropagation()">${t}</span>
      </div>`).join('')}</div>`:'';
    const arrived=a.status==='е·ІеҲ°иЁә';
    const checkedIn=a.status==='е ұеҲ°дёӯ';
    const statusClass=arrived?'arrived':checkedIn?'checked':'waiting';
    const statusText=arrived?'е·ІеҲ°иЁә':checkedIn?'е·Іе ұеҲ°':'еҫ…еҲ°иЁә';
    const noteHtml=a.note?`<div style="font-size:11px;color:var(--text2);margin-top:4px">рҹ“қ ${a.note}</div>`:'';
    return`<div class="appt-card ${arrived?'arrived':checkedIn?'checked-in':''}" id="appt-card-${a.id}" onmousedown="apptMouseDown(event,'${a.id}')" onclick="openApptDetail('${a.id}')">
      <div class="appt-card-name">${a.name}</div>
      <div class="appt-card-time"><i class="ti ti-clock" style="font-size:11px"></i>${a.appt_time||'жңӘиЁӯе®ҡ'}</div>
      ${checklist}
      ${noteHtml}
      <span class="appt-status ${statusClass}">${statusText}</span>
    </div>`;
  }).join('');
}

async function toggleApptItem(apptId,itemIdx,checkbox){
  const a=(state.appointments||[]).find(x=>x.id===apptId);if(!a)return;
  const checked=Array.isArray(a.checked_items)?[...a.checked_items]:[];
  if(checkbox.checked){if(!checked.includes(itemIdx))checked.push(itemIdx);}
  else{const i=checked.indexOf(itemIdx);if(i>=0)checked.splice(i,1);}
  a.checked_items=checked;
  // Update label style immediately
  const label=checkbox.nextElementSibling;
  if(label){label.style.textDecoration=checkbox.checked?'line-through':'';label.style.opacity=checkbox.checked?'0.5':'1';}
  await db.from('appointments').update({checked_items:checked}).eq('id',apptId);
}

let selectedItems=[];
function toggleItem(el,item){
  if(selectedItems.includes(item)){selectedItems=selectedItems.filter(x=>x!==item);el.classList.remove('selected');}
  else{selectedItems.push(item);el.classList.add('selected');}
}
function filterItems(q){
  const lq=q.toLowerCase();
  document.querySelectorAll('#ap-items .item-chip').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(lq)?'':'none';});
}

async function addAppt(){
  const name=document.getElementById('ap-name').value.trim();
  if(!name){alert('и«Ӣијёе…Ҙе§“еҗҚ');return;}
  const time=document.getElementById('ap-time').value;
  const note=document.getElementById('ap-note').value.trim();
  const newA={name,appt_date:todayStr(),appt_time:time,items:selectedItems,note,status:'еҫ…еҲ°иЁә',checked_items:[]};
  selectedItems=[];closeModalDirect();
  const{data}=await db.from('appointments').insert(newA).select().single();
  if(data){state.appointments=state.appointments||[];state.appointments.push(data);}
  renderApptList();renderStats();
  showNotif(`вң… ${name} е·ІеҠ е…Ҙд»Ҡж—Ҙе®ўжҲ¶`);
}

let _apptDragId=null,_apptGhost=null,_apptDragStarted=false,_apptMouseX=0,_apptMouseY=0;

function apptMouseDown(e,id){
  if(e.button!==0)return;
  _apptDragId=id;_apptDragStarted=false;
  _apptMouseX=e.clientX;_apptMouseY=e.clientY;
  document.addEventListener('mousemove',_apptMouseMove);
  document.addEventListener('mouseup',_apptMouseUp);
  e.stopPropagation();
}
function _apptMouseMove(e){
  if(!_apptDragId)return;
  const dx=e.clientX-_apptMouseX,dy=e.clientY-_apptMouseY;
  if(!_apptDragStarted&&Math.sqrt(dx*dx+dy*dy)<6)return;
  if(!_apptDragStarted){
    _apptDragStarted=true;
    // е»әз«Ӣе№ҪйқҲеҚЎзүҮ
    const src=document.getElementById('appt-card-'+_apptDragId);
    _apptGhost=document.createElement('div');
    _apptGhost.style.cssText='position:fixed;z-index:9999;opacity:.8;pointer-events:none;background:var(--amber-dim);border:2px solid var(--amber);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)';
    const a=(state.appointments||[]).find(x=>x.id===_apptDragId);
    _apptGhost.textContent='рҹ“Ӣ '+(a?.name||'е®ўжҲ¶');
    document.body.appendChild(_apptGhost);
    src?.classList.add('dragging');
    // жЁҷзӨәеҸҜж”ҫзҪ®зҡ„ col
    document.querySelectorAll('.col').forEach(c=>c.style.outline='2px dashed var(--amber)');
  }
  _apptGhost.style.left=(e.clientX+12)+'px';
  _apptGhost.style.top=(e.clientY-16)+'px';
  // й«ҳдә®з•¶еүҚ col
  document.querySelectorAll('.col').forEach(c=>c.style.outline='2px dashed var(--amber)');
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const col=el?.closest('.col');
  if(col) col.style.outline='2px solid var(--amber)';
}
async function _apptMouseUp(e){
  document.removeEventListener('mousemove',_apptMouseMove);
  document.removeEventListener('mouseup',_apptMouseUp);
  if(_apptGhost){_apptGhost.remove();_apptGhost=null;}
  document.querySelectorAll('.col').forEach(c=>c.style.outline='');
  document.querySelectorAll('.appt-card').forEach(c=>c.classList.remove('dragging'));
  if(!_apptDragStarted){_apptDragId=null;return;}
  // жүҫеҲ°ж”ҫзҪ®зҡ„ col
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const colEl=el?.closest('.col');
  if(colEl){
    // еҫһ col id="cards-xxx" еӯҗе…ғзҙ еҸ–еҫ— colId
    const cardsEl=colEl.querySelector('[id^="cards-"]');
    if(cardsEl){
      const colId=cardsEl.id.replace('cards-','');
      await apptToBoardCol(_apptDragId,colId);
    }
  }
  _apptDragId=null;_apptDragStarted=false;
}
async function apptToBoardCol(id,colId){
  const a=(state.appointments||[]).find(x=>x.id===id);if(!a)return;
  const col=state.columns.find(c=>c.id===colId);if(!col)return;
  const notes=(a.items||[]).map(t=>({text:t,checked:false}));
  // е…ҲжЁҷиЁҳ UIпјҲд»Ҡж—Ҙе®ўжҲ¶и®Ҡжҡ—пјҢд»ҚйЎҜзӨәпјү
  const appt=state.appointments.find(x=>x.id===id);
  if(appt) appt.status='е·ІеҲ°иЁә';
  renderApptList();
  // еҠ е…ҘзңӢжқҝ
  const{data,error}=await db.from('patients').insert({
    name:a.name,column_id:colId,sort_order:patientsInCol(colId).length,
    tag:'еҲқиЁә',checkin_time:now(),discharge_time:null,notes
  }).select().single();
  if(error){showNotif('еҠ е…ҘзңӢжқҝеӨұж•—пјҡ'+error.message,'var(--red)');return;}
  if(data){state.patients.push({...data,notes:data.notes||[]});renderBoard();renderStats();}
  await db.from('appointments').update({status:'е·ІеҲ°иЁә'}).eq('id',id);
  showNotif(`${a.name} е·ІжӢ–е…ҘгҖҢ${col.name}гҖҚпјҒ`);
}
async function apptToBoard(id){
  const a=(state.appointments||[]).find(x=>x.id===id);if(!a)return;
  closeModalDirect();
  const firstCol=[...state.columns].sort((x,y)=>x.sort_order-y.sort_order)[0];
  if(!firstCol){showNotif('и«Ӣе…Ҳе»әз«Ӣз«ҷеҲҘ');return;}
  const notes=(a.items||[]).map(t=>({text:t,checked:false}));
  const{data}=await db.from('patients').insert({
    name:a.name,column_id:firstCol.id,sort_order:patientsInCol(firstCol.id).length,
    tag:'еҲқиЁә',checkin_time:now(),discharge_time:null,notes
  }).select().single();
  if(data){state.patients.push({...data,notes:data.notes||[]});renderBoard();renderStats();}
  await markArrived(id);
  showNotif(`${a.name} е·ІеҠ е…ҘзңӢжқҝпјҒ`);
}

async function deleteAppt(id){
  if(!confirm('зўәе®ҡеҲӘйҷӨжӯӨе®ўжҲ¶пјҹ'))return;
  state.appointments=(state.appointments||[]).filter(x=>x.id!==id);
  closeModalDirect();renderApptList();renderStats();

// в”Җв”Җ CHAT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderChat(){
  const el=document.getElementById('chat-messages');if(!el)return;
  const me=myName();let lastDate='',html='';
  state.messages.forEach(m=>{
    const d=(m.created_at||'').substring(0,10);
    if(d&&d!==lastDate){html+=`<div class="day-div"><span>${d===todayStr()?'д»ҠеӨ©':d}</span></div>`;lastDate=d;}
    const isMe=m.author===me;
    const isMentioned=!!(me&&m.text&&m.text.includes('@'+me)&&!isMe);
    const confirms=Array.isArray(m.confirmations)?m.confirmations:[];
    const alreadyConfirmed=me&&confirms.includes(me);
    const confirmTags=confirms.map(c=>`<span class="confirm-tag"><i class="ti ti-check"></i>${c}</span>`).join('');
    html+=`<div class="msg-bubble ${isMe?'me':''} ${isMentioned?'mentioned':''}">
      ${isMentioned?'<div class="mentioned-tag">рҹ“ў жӮЁе·Іиў«жЁҷиЁ»</div>':''}
      <div class="msg-meta"><span class="author">${m.author}</span><span>${m.time||''}</span></div>
      <div class="msg-body">${hlText(m.text)}</div>
      <div class="msg-confirm">
        ${!isMe&&!alreadyConfirmed&&m.id?`<button class="confirm-btn" onclick="confirmMsg('${m.id}')"><i class="ti ti-check"></i>е·Іи®ҖзўәиӘҚ</button>`:''}
        ${alreadyConfirmed?'<span class="confirm-tag"><i class="ti ti-check"></i>е·ІзўәиӘҚ</span>':''}
        ${confirmTags}
      </div>
    </div>`;
  });
  el.innerHTML=html||'<div style="color:var(--text2);font-size:12px;text-align:center;margin-top:20px">е°ҡз„ЎиЁҠжҒҜпјҢй–Ӣе§Ӣе°Қи©ұеҗ§пјҒ</div>';
  el.scrollTop=el.scrollHeight;
}
async function confirmMsg(msgId){
  const me=myName();if(!me)return;
  const m=state.messages.find(x=>x.id===msgId);if(!m)return;
  if(!Array.isArray(m.confirmations))m.confirmations=[];
  if(m.confirmations.includes(me))return;
  m.confirmations.push(me);renderChat();
  await db.from('clinic_messages').update({confirmations:m.confirmations}).eq('id',msgId);
  showNotif(`вң… ${me} е·ІзўәиӘҚ`);
}
async function sendMsg(){
  const inp=document.getElementById('chat-input'),text=inp.value.trim();
  const who=myName();
  if(!who){showNotif('и«Ӣе…Ҳзҷ»е…Ҙ','var(--red)');return;}
  if(!text)return;
  inp.value='';hideMentionPopup();
  const msg={author:who,text,time:now(),created_at:new Date().toISOString(),confirmations:[]};
  const tmpId='tmp-'+Date.now();
  state.messages.push({...msg,id:tmpId});renderChat();
  const{data}=await db.from('clinic_messages').insert({author:who,text,time:msg.time,confirmations:[]}).select().single();
  if(data){
    const idx=state.messages.findIndex(m=>m.id===tmpId);
    if(idx>=0)state.messages[idx]={...data,confirmations:[]};
    myMsgIds.add(data.id);renderChat();
  }
}
function quickMsg(text){document.getElementById('chat-input').value=text+' ';document.getElementById('chat-input').focus()}
function quickPatientRef(){

function insertPatientRef(){
  document.getElementById('chat-input').value+='#'+document.getElementById('pref-sel').value+' ';

function onChatInput(e){
  const val=e.target.value,pos=e.target.selectionStart,before=val.substring(0,pos);
  const atM=before.match(/@(\w*)$/),hashM=before.match(/#(\S*)$/);
  const staffNames=state.staffList.map(s=>s.name);
  if(atM)showMentionPopup(staffNames.filter(s=>s.includes(atM[1])),s=>'@'+s,'рҹ‘Ө');
  else if(hashM)showMentionPopup(state.patients.filter(p=>!p.discharge_time&&p.name.includes(hashM[1])).map(p=>p.name),s=>'#'+s,'вқӨпёҸ');
  else hideMentionPopup();
}
function showMentionPopup(items,fmt,icon){
  const pop=document.getElementById('mention-popup');
  if(!items.length){pop.style.display='none';return;}
  pop.innerHTML=items.map(s=>`<div class="mention-item" onclick="insertMention('${fmt(s)}')">${icon} ${fmt(s)}</div>`).join('');
  pop.style.display='block';
}
function hideMentionPopup(){document.getElementById('mention-popup').style.display='none'}
function insertMention(val){
  const inp=document.getElementById('chat-input'),pos=inp.selectionStart;
  inp.value=inp.value.substring(0,pos).replace(/[@#]\S*$/,val+' ')+inp.value.substring(pos);
  inp.focus();hideMentionPopup();
}
function onChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}if(e.key==='Escape')hideMentionPopup()}

async function onDrop(e,colId){
  e.preventDefault();document.getElementById('cards-'+colId)?.classList.remove('drop-highlight');
  // з—…жӮЈеҚЎжӢ–жӣіпјҲappt card з”Ё pointer events иҷ•зҗҶпјҢдёҚиө°йҖҷиЈЎпјү
  if(!dragId)return;
  const p=state.patients.find(x=>x.id===dragId);
  if(!p||p.column_id===colId){dragId=null;return;}
  const newOrder=patientsInCol(colId).length;
  p.column_id=colId;p.sort_order=newOrder;renderBoard();
  const col=state.columns.find(c=>c.id===colId);
  showNotif(`${p.name} е·Із§»иҮігҖҢ${col?.name}гҖҚ`);
  await db.from('patients').update({column_id:colId,sort_order:newOrder}).eq('id',p.id);

async function moveCard(id,dir){
  const p=state.patients.find(x=>x.id===id);
  const col=patientsInCol(p.column_id);
  const idx=col.findIndex(x=>x.id===id),ni=idx+dir;
  if(ni<0||ni>=col.length)return;
  const tmp=col[idx].sort_order;col[idx].sort_order=col[ni].sort_order;col[ni].sort_order=tmp;
  renderBoard();
  await db.from('patients').update({sort_order:col[idx].sort_order}).eq('id',col[idx].id);
  await db.from('patients').update({sort_order:col[ni].sort_order}).eq('id',col[ni].id);
}

    <div class="form-row"><label>е ұеҲ°жҷӮй–“</label><input id="ep-checkin" value="${p.checkin_time||''}"></div>
    <div class="form-row"><label>йӣўйҷўжҷӮй–“</label><input id="ep-discharge" value="${p.discharge_time||''}"></div>
    <div class="form-row"><label>з«ҷеҲҘ</label><select id="ep-col">${state.columns.map(c=>`<option value="${c.id}"${p.column_id===c.id?' selected':''}>${c.name}</option>`).join('')}</select></div>
    <div class="form-row"><label>йЎһеһӢ</label><select id="ep-tag"><option${p.tag==='еҲқиЁә'?' selected':''}>еҲқиЁә</option><option${p.tag==='еӣһиЁә'?' selected':''}>еӣһиЁә</option><option${p.tag==='жҖҘиЁә'?' selected':''}>жҖҘиЁә</option></select></div>
    <div class="form-row"><label>дҫҶиЁәзӣ®зҡ„пјҲжҜҸиЎҢдёҖй …пјҢеҸҜеӢҫйҒёпјү</label><textarea id="ep-notes">${(p.notes||[]).map(n=>n.text).join('\n')}</textarea></div>
    <div class="form-row"><label>еӮҷиЁ»пјҲзҙ”ж–Үеӯ—пјү</label><input id="ep-remark" value="${p.remark||''}"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalDirect()">еҸ–ж¶Ҳ</button>
      <button class="btn btn-primary" onclick="saveEdit('${id}')">е„Іеӯҳ</button>
    </div>
  </div>`);
}
async function saveEdit(id){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('ep-name').value.trim()||p.name;
  p.checkin_time=document.getElementById('ep-checkin').value.trim()||null;
  p.discharge_time=document.getElementById('ep-discharge').value.trim()||null;
  p.column_id=document.getElementById('ep-col').value;
  p.tag=document.getElementById('ep-tag').value;
  const raw=document.getElementById('ep-notes').value.trim();
  // дҝқз•ҷж—ўжңүеӢҫйҒёзӢҖж…Ӣ
  p.notes=raw?raw.split('\n').filter(l=>l.trim()).map(t=>{const ex=(p.notes||[]).find(n=>n.text===t);return ex||{text:t,checked:false}}):[];
  p.remark=document.getElementById('ep-remark').value.trim();
  closeModalDirect();renderBoard();
  await db.from('patients').update({name:p.name,checkin_time:p.checkin_time,discharge_time:p.discharge_time,column_id:p.column_id,tag:p.tag,notes:p.notes,remark:p.remark}).eq('id',id);
}
function openSettings(){
  if(!isAdmin())return;
  const sorted=[...state.columns].sort((a,b)=>a.sort_order-b.sort_order);
  openModal(`<div class="modal" onclick="event.stopPropagation()">
    <h3>з®ЎзҗҶз«ҷеҲҘй ҶеәҸ</h3>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
      ${sorted.map((c,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)">
        <span style="flex:1;font-size:13px">${c.name}</span>
        <button class="icon-btn" onclick="moveColOrder('${c.id}',-1)" ${i===0?'disabled':''}><i class="ti ti-arrow-up"></i></button>
        <button class="icon-btn" onclick="moveColOrder('${c.id}',1)" ${i===sorted.length-1?'disabled':''}><i class="ti ti-arrow-down"></i></button>
      </div>`).join('')}
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModalDirect()">е®ҢжҲҗ</button></div>
  </div>`);
}
async function moveColOrder(id,dir){
  const sorted=[...state.columns].sort((a,b)=>a.sort_order-b.sort_order);
  const idx=sorted.findIndex(c=>c.id===id),ni=idx+dir;
  if(ni<0||ni>=sorted.length)return;
  const tmp=sorted[idx].sort_order;sorted[idx].sort_order=sorted[ni].sort_order;sorted[ni].sort_order=tmp;
  closeModalDirect();renderBoard();openSettings();
  await db.from('columns').update({sort_order:sorted[idx].sort_order}).eq('id',sorted[idx].id);
  await db.from('columns').update({sort_order:sorted[ni].sort_order}).eq('id',sorted[ni].id);
}

// в”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
db.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session?.user&&!currentUser){
    await afterLogin(session.user);
  }
});
db.auth.getSession().then(async({data:{session}})=>{
  if(session?.user)await afterLogin(session.user);
});
</script>
